spring:

  application:
    name: WebApp

  # H2 Database configuration for development
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: update # Automatically create/update tables
    show-sql: true # Show SQL queries in console
  h2:
    console:
      enabled: true # Enable H2 console for viewing database
      path: /h2-console
