<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Edit Student</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        .course-selection {
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #ced4da;
            border-radius: .25rem;
            padding: .375rem .75rem;
        }
        .course-selection .form-check {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container my-3">
        <h2>Edit Student</h2>
        <form th:action="@{/students/{id}(id=${studentDTO.id})}" th:object="${studentDTO}" method="post">
            <input type="hidden" th:field="*{id}" />
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" th:field="*{name}" id="name" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="roll">Roll:</label>
                <input type="text" th:field="*{roll}" id="roll" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Courses:</label>
                <div class="course-selection">
                    <div th:each="course : ${allCourses}" class="form-check">
                        <input type="checkbox" th:id="${'course' + course.id}" th:name="selectedCourseIds" th:value="${course.id}"
                               th:checked="${studentDTO.selectedCourseIds != null and studentDTO.selectedCourseIds.contains(course.id)}"
                               class="form-check-input">
                        <label th:for="${'course' + course.id}" th:text="${course.name}" class="form-check-label"></label>
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Update Student</button>
            <a th:href="@{/students}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</body>
</html>
