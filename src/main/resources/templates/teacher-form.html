<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Edit Teacher</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        .course-selection {
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #ced4da;
            border-radius: .25rem;
            padding: .375rem .75rem;
        }
        .course-selection .form-check {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container my-3">
        <h2>Edit Teacher</h2>
        <form th:action="@{/teachers/{id}(id=${teacher.id})}" th:object="${teacher}" method="post">
            <input type="hidden" th:field="*{id}" />
            <div class="form-group">
                <label for="firstName">First Name:</label>
                <input type="text" th:field="*{firstName}" id="firstName" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="lastName">Last Name:</label>
                <input type="text" th:field="*{lastName}" id="lastName" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" th:field="*{email}" id="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="department">Department:</label>
                <select th:field="*{department.id}" id="department" class="form-control" required>
                    <option value="">Select Department</option>
                    <option th:each="dept : ${departments}"
                            th:value="${dept.id}"
                            th:text="${dept.name}"
                            th:selected="${teacher.department != null and teacher.department.id == dept.id}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Courses Taught:</label>
                <div class="course-selection">
                    <div th:each="course : ${allCourses}" class="form-check">
                        <input type="checkbox" th:id="${'course' + course.id}" th:name="selectedCourseIds" th:value="${course.id}"
                               th:checked="${selectedCourseIds != null and selectedCourseIds.contains(course.id)}"
                               class="form-check-input">
                        <label th:for="${'course' + course.id}" th:text="${course.name}" class="form-check-label"></label>
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Update Teacher</button>
            <a th:href="@{/teachers}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</body>
</html>
