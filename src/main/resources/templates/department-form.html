<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${department.id == null ? 'Create Department' : 'Edit Department'}"></title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container my-2" sec:authorize="hasRole('ADMIN')">
        <h2 th:text="${department.id == null ? 'Create New Department' : 'Edit Department'}"></h2>
        <form th:action="${department.id == null ? '/departments' : '/departments/' + department.id}" th:object="${department}" method="post">
            <div class="form-group" th:if="${department.id != null}">
                <input type="hidden" th:field="*{id}" />
            </div>
            <div class="form-group">
                <label for="name">Department Name</label>
                <input type="text" th:field="*{name}" id="name" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="/departments" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
    <div class="container my-2" sec:authorize="hasAnyRole('TEACHER', 'STUDENT')">
        <p>You do not have permission to modify department information.</p>
    </div>
</body>
</html>
